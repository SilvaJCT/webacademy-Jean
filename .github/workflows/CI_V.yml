name: Pipeline com Múltiplos Jobs

on:
  push:

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Exibir data
        run: date

      - name: Exibir versão do Git
        run: git --version

  job2:
    runs-on: ubuntu-latest
    needs: job1   # Só executa depois do Job 1

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verificar README.md
        run: |
          if [ ! -f "README.md" ]; then
            echo "❌ README.md não encontrado!"
            exit 1
          else
            echo "✔ README.md encontrado."
          fi

      - name: Verificar LICENSE
        run: |
          if [ ! -f "LICENSE" ]; then
            echo "❌ LICENSE não encontrado!"
            exit 1
          else
            echo "✔ LICENSE encontrado."
          fi

      - name: Verificar .gitignore
        run: |
          if [ ! -f ".gitignore" ]; then
            echo "❌ .gitignore não encontrado!"
            exit 1
          else
            echo "✔ .gitignore encontrado."
          fi
